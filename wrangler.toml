name = "katelyatv"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# 默认 D1 数据库配置（用于命令行操作）
[[d1_databases]]
binding = "DB"
database_name = "katelyatv-db"
database_id = "bcdc22bd-5ea6-4b23-93af-d9dcf20dddca"

# 环境变量
[vars]
NEXT_PUBLIC_STORAGE_TYPE = "d1"
NEXT_PUBLIC_ENABLE_REGISTER = "true"
NEXT_PUBLIC_USER_SYSTEM = "true"
NEXT_PUBLIC_SITE_NAME = "KatelyaTV"
NEXT_PUBLIC_SITE_DESCRIPTION = "高性能影视播放平台"
NEXTAUTH_URL = "https://katelyatv-bes.pages.dev/"
USERNAME = "katelya"
AUTH_PASSWORD = "guanying3!"
IMAGE_PROXY_ENABLED = "true"
CACHE_TTL = "3600"
CORS_ORIGIN = "*"
RATE_LIMIT_MAX = "100"
RATE_LIMIT_WINDOW = "60000"
HEALTH_CHECK_ENABLED = "true"
HEALTH_CHECK_INTERVAL = "30"
LOG_LEVEL = "info"
LOG_FORMAT = "json"
NODE_ENV = "production"
